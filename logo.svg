<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Biofarms.ai logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a3a2a"/>
      <stop offset="1" stop-color="#1a6b4d"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#a3e635"/>
      <stop offset="0.55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="2" y="2" width="96" height="96" rx="26" fill="url(#bg)"/>
  <rect x="2.75" y="2.75" width="94.5" height="94.5" rx="25.25" fill="none" stroke="#34d399" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- leaf -->
  <path d="M50 24
           C68 33 71 56 52 80
           C50 82 50 82 48 80
           C29 56 32 33 50 24 Z"
        fill="url(#leaf)"/>
  <!-- midrib -->
  <path d="M50 30 L50 78" stroke="#0a3a2a" stroke-width="2.4" stroke-linecap="round" opacity="0.32"/>
  <!-- side veins -->
  <path d="M50 46 L40 41 M50 56 L60 51 M50 66 L41 61"
        stroke="#0a3a2a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.22"/>

  <!-- AI data node at the growing tip -->
  <circle cx="50" cy="24" r="9.5" fill="#0a3a2a"/>
  <circle cx="50" cy="24" r="6.5" fill="#0ea5e9"/>
  <circle cx="50" cy="24" r="6.5" fill="none" stroke="#bae6fd" stroke-width="1.2" opacity="0.7"/>
  <circle cx="47.6" cy="21.6" r="1.7" fill="#e0f2fe"/>
</svg>
