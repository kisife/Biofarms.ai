<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3a2a"/>
      <stop offset="100%" style="stop-color:#1a6b4d"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#34d399" stroke-width="2" opacity="0.3"/>
  
  <!-- B shape formed by leaf silhouette -->
  <!-- Leaf body -->
  <path d="M 100 45 
           Q 70 50 55 80 
           Q 50 100 65 120
           Q 55 130 55 145
           Q 55 160 70 165
           L 130 165
           Q 145 160 145 145
           Q 145 130 135 120
           Q 150 100 145 80
           Q 130 50 100 45 Z" 
        fill="url(#leafGrad)"/>
  
  <!-- Leaf vein line -->
  <path d="M 100 50 L 100 160" stroke="#0a3a2a" stroke-width="3" fill="none" opacity="0.2"/>
  
  <!-- B negative space (the letter cutout) -->
  <!-- B top loop -->
  <ellipse cx="100" cy="85" rx="22" ry="20" fill="#0a3a2a"/>
  <!-- B bottom loop -->
  <ellipse cx="100" cy="130" rx="25" ry="22" fill="#0a3a2a"/>
  <!-- B vertical bar -->
  <rect x="82" y="70" width="10" height="80" rx="3" fill="#0a3a2a"/>
  
  <!-- AI dot accent (the dot on the i) -->
  <circle cx="155" cy="55" r="8" fill="#0ea5e9"/>
  
  <!-- Subtle circuit/pixel pattern overlay for AI -->
  <rect x="75" y="75" width="4" height="4" fill="#0a3a2a" opacity="0.15"/>
  <rect x="121" y="75" width="4" height="4" fill="#0a3a2a" opacity="0.15"/>
  <rect x="75" y="121" width="4" height="4" fill="#0a3a2a" opacity="0.15"/>
  <rect x="121" y="121" width="4" height="4" fill="#0a3a2a" opacity="0.15"/>
</svg>
